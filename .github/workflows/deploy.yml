name: Deploy to GitHub Pages

# Builds on PRs (so we can see it compiles before merging, e.g. Dependabot bumps)
# and on push to main; only main actually deploys.
on:
  push:
    branches: [main]
    paths: &build-paths
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - ".github/workflows/deploy.yml"
  pull_request:
    paths: *build-paths
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't let PR builds and the main deploy block each other.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build with Astro
        uses: withastro/action@v6
        with:
          node-version: 22
        # package-manager auto-detected from pnpm-lock.yaml; pnpm version from packageManager.
        # build runs `pnpm build` -> ./dist, uploaded as the pages artifact

  deploy:
    needs: build
    # PRs build only — never deploy.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
